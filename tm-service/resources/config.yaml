service:
  port: 8081
  host: "0.0.0.0"
  root_path: ""
  name: "local-service"
app:
  logging_conf_path: "./resources/logging.ini"
  use_scheduler: false
  use_rest_api: true
  use_ke_api: true
  country_list:
    - "Poland"
    - "Spain"
    - "Germany"
    - "Belgium"
#    - "Austria"
#db does not require env prefix
db:
  db_host: "postgres"
  db_user: "postgres"
  db_name: "postgres"
  db_port: 5432
  #  db_pass:
  db_log_query: false
  db_log_error_query: true
  db_max_rows: 65000
  #  db_init_script_location: "path/to/script.sql"
  db_table_prefix: ""
  db_schema_name: "public"
  db_init: true
ke:
  #  rest_endpoint:
  allow_partial_ki: true
  ki_config_path: ./resources/deployment/ke_config.yaml
  ki_vars:
    DAY_DURATION: '"PT1440M"^^xsd:duration'
    ISP_UNIT: '"PT15M"^^xsd:duration'
    CURRENCY_UNIT: "EUR"
    ENERGY_COST_UNIT: "EURPerMegawattHour"
#  ontology_prefixes:
#    saref: "https://saref.etsi.org/core/"
#    foaf: "http://xmlns.com/foaf/0.1/"
#    ubmarket: "https://ubflex.bluebird.eu/market/"
  extension_ontology_files:
    - "./resources/deployment/ki/bluebird.ttl"
    - "./resources/deployment/ki/resources.ttl"