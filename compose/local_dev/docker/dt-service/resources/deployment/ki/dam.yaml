knowledge_engine:
  kb_name: ""
  kb_description: ""
  graph_patterns:
    dam-service:
      name: "dam-service"
      description: "Information about service"
      pattern:
        - ' ?dam_service rdf:type saref:Device  ; saref:hasFunctionOfInterest ?dam_function . '
        - ' ?dam_function rdf:type saref:FunctionOfInterest; saref:hasCommandOfInterest  ?dam_data_command  . '
        - ' ?dam_data_command rdf:type saref:CommandOfInterest;  saref:hasCommandKind ubmarket:get_data_command ; '
        - '           saref:observes  ubmarket:MarketType .'
    dam-start-command:
      name: "dam-start-command"
      description: "Graph pattern for starting data acquisition task"
      prefixes:
        time: "http://www.w3.org/2006/time#"
      pattern:
        - ' ?dam_data_command  saref:observes ?market . '
        - ' ?ts_interval_uri rdf:type time:Interval; time:hasBeginning ?ts_date_from; time:hasEnd ?ts_date_to .'
      result_pattern:
        - ' ?procedure_execution rdf:type saref:ProcedureExecution; saref:isExecutionOf ?dam_data_command ; '
        - '    saref:hasStartTime ?time_start. '
    dam-state-command:
      name: "dam-state-command"
      description: "State service-command"
      prefixes:
        time: "http://www.w3.org/2006/time#"
      pattern:
        - ' ?procedure_execution rdf:type saref:ProcedureExecution; saref:isExecutionOf  ?dam_data_command;'
        - '    saref:hasStartTime ?time_start; saref:hasEndTime ?end_time .'
    market:
      name: "market"
      description: "Basic information about the market. Used in ANSWER,ASK,POST,REACT. "
      prefixes:
        s4city: "https://saref.etsi.org/s4city/"
        foaf: "http://xmlns.com/foaf/0.1/"
        rdfs: "http://www.w3.org/2000/01/rdf-schema#"
      pattern:
        - ' ?market_uri rdf:type ?market_type ; rdfs:subClassOf foaf:Agent ;'
        - '      s4city:hasAdministrativeArea ?country_uri .'
        - ' ?country_uri rdf:type s4city:Country ; ubmarket:hasISO3166Name ?country_name .'
        - ' ?market_type rdf:type ubmarket:MarketType .'
    market-offer-info-filtered:
      name: "market-offer-info-filtered"
      description: "Information about new offer with time filter. Used in ANSWER,ASK ."
      required_bindings:
        - "market_uri"
      prefixes:
        xsd: "http://www.w3.org/2001/XMLSchema#"
        time: "http://www.w3.org/2006/time#"
      pattern:
        - ' ?market_uri rdf:type ?market_type .'
        - ' ?market_type rdf:type ubmarket:MarketType .'
        - ' ?offer_uri rdf:type ubmarket:MarketTimeSeries .'
        - ' ?offer_uri s4ener:producedBy ?market_uri .'
        - ' ?offer_uri ubmarket:hasMarketSequence ?sequence .'
        - ' ?offer_uri s4ener:hasUpdateRate ?update_rate .'
        - ' ?offer_uri s4ener:hasCreationTime ?time_create .'
        - ' ?offer_uri s4ener:hasEffectivePeriod ?duration  .'
        - ' ?ts_interval_uri rdf:type time:Interval; time:hasBeginning ?ts_date_from; time:hasEnd ?ts_date_to .'
    market-offer-info:
      name: "market-offer-info"
      description: "Information about new offer. Used in ANSWER,ASK,POST,REACT."
      required_bindings:
        - "market_uri"
      prefixes:
        xsd: "http://www.w3.org/2001/XMLSchema#"
      pattern:
        - ' ?market_uri rdf:type ?market_type .'
        - ' ?market_type rdf:type ubmarket:MarketType .'
        - ' ?offer_uri rdf:type ubmarket:MarketTimeSeries .'
        - ' ?offer_uri ubmarket:hasMarketSequence ?sequence .'
        - ' ?offer_uri s4ener:producedBy ?market_uri .'
        - ' ?offer_uri s4ener:hasUpdateRate  ?update_rate.'
        - ' ?offer_uri s4ener:hasCreationTime ?time_create .'
        - ' ?offer_uri s4ener:hasEffectivePeriod  ?duration .'
    market-offer:
      name: "market-offer"
      description: "Daily offer of the market. Used in ANSWER,ASK,POST,REACT."
      prefixes:
        xsd: "http://www.w3.org/2001/XMLSchema#"
        saref: "https://saref.etsi.org/core/"
      required_bindings:
        - "offer_uri"
      pattern:
        - ' ?offer_uri rdf:type ubmarket:MarketTimeSeries .'
        - ' ?dp s4ener:belongsToTimeSeries ?offer_uri ; rdf:type s4ener:DataPoint ; saref:hasTimestamp ?ts ;'
        - '   s4ener:hasEffectivePeriod ?duration ; saref:hasResult ?dpr.'
        - ' ?dpr saref:hasValue ?value ; saref:isMeasuredIn ?is_measured_in.'


